<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quattrocento+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>

    <link rel="stylesheet" href="style.css" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="button-wrapper">
      <button>Current Location</button>
      <button>Change °F to °C</button>
    </div>

    <div class="container">
      <h1>Tuesday, October 17, 2023</h1>

      <form>
        <input type="text" placeholder="Search for a city" class="search-bar" />
        <input type="submit" value="Search" class="submit-button" />
      </form>

      <div class="row current-weather-row">
        <div class="col-6">
          <h2>London, England</h2>
          <span class="current-temperature">77° F</span>
          <img src="" alt="Weather Icon" />
          <h4>Clear Sky</h4>
        </div>

        <div class="col-6">
          <ul>
            <li>Feels like: 75°</li>
            <li>Humidity: 0%</li>
            <li>Wind Speed: 3 mph</li>
          </ul>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
